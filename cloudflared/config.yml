# Cloudflare Tunnel ingress za Coolify Supabase
#
# Preporuka: koristi Cloudflare Zero Trust UI (Networks → Tunnels → Public
# Hostnames) umjesto YAML-a — UI radi isto, ali tunel se sam ažurira bez
# restarta cloudflared containera.
#
# Ovaj file je referentni / za slučaj da želiš self-managed tunel.

tunnel: <TUNNEL_UUID>
credentials-file: /etc/cloudflared/<TUNNEL_UUID>.json

ingress:
  # 1) Glavni Supabase API gateway (Kong) — sve rute idu kroz njega:
  #    /auth/v1/*, /rest/v1/*, /realtime/v1/* (WS), /storage/v1/*,
  #    /functions/v1/*, /pg/*, /analytics/v1/*
  - hostname: api.domovina.ai
    service: http://traefik:80
    originRequest:
      noTLSVerify: true
      connectTimeout: 30s
      # Realtime WS-ovi
      keepAliveTimeout: 90s
      keepAliveConnections: 100

  # 2) Supabase Studio admin UI — OBAVEZNO Cloudflare Access policy (vidi
  #    docs/deployment-runbook.md, korak "Cloudflare Access za Studio")
  - hostname: studio.domovina.ai
    service: http://traefik:80
    originRequest:
      noTLSVerify: true

  # Catch-all (obavezno na kraju)
  - service: http_status:404
