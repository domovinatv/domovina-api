# Supabase CLI config (minimal — koristi se ako kasnije instaliraš `supabase` CLI).
# Trenutni workflow ne ovisi o CLI-u; sve ide kroz scripts/db-*.sh + SSH + docker exec.
# Kad budemo dodali type-gen (`supabase gen types dart`), CLI postaje koristan.

project_id = "domovina-api"

# Dedicated 553xx port block (not the CLI defaults 5432x) so this local stack
# coexists with other local Supabase projects on the same machine without port
# collisions. major_version 15 mirrors the Coolify prod Postgres.

[db]
port = 55322
shadow_port = 55320
major_version = 15

[api]
port = 55321
schemas = ["public", "domovina_ai", "pinka_finance", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]

[studio]
port = 55323

[inbucket]
port = 55324

[analytics]
port = 55327

[auth]
site_url = "https://domovina.ai"
additional_redirect_urls = [
  "https://domovina.ai",
  "https://www.domovina.ai",
  "https://domovina.energy",
  "https://www.domovina.energy",
  "https://domovina.tv",
  "https://www.domovina.tv",
  "http://localhost:3000",
  "http://localhost:3000/**",
  "http://localhost:3007",
  "http://localhost:3007/**",
  "http://localhost:5173",
  "http://localhost:5173/**",
  "ai.domovina://auth/callback",
]
jwt_expiry = 3600
enable_signup = true

# Google login provider (GoTrue-native OAuth). Odvojen od youtube-claim Google
# clienta (Princip D — vidi supabase/functions/.env). client_id/secret se
# interpoliraju iz env-a pri `supabase start` (CLI godotenv: cwd `.env` +
# procesni env). Vrijednosti GOTRUE_EXTERNAL_GOOGLE_* žive u .local-secrets.env;
# `scripts/dev-local.sh` ih exporta prije start-a.
#
# Lokalno: u GCP OAuth clientu (GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID) mora biti
# Authorized redirect URI = http://127.0.0.1:55321/auth/v1/callback (GoTrue
# callback), pa GoTrue redirecta na app redirect (:5173, već u additional_*).
[auth.external.google]
enabled = true
client_id = "env(GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID)"
secret = "env(GOTRUE_EXTERNAL_GOOGLE_SECRET)"

[functions.handoff-consume]
verify_jwt = false   # interno verificiramo authHeader (getUser) prije consume-a

[functions.passkey]
verify_jwt = false   # login/register-new nemaju sesiju; auth se interno provjerava gdje treba

[functions.certilia]
verify_jwt = false   # bridge prima Certilia idToken (verificira se interno vs JWKS), ne GoTrue JWT

[functions.pinka-contribute]
verify_jwt = false   # interno getUser (anon sesija je OK); create_contribution ide preko user klijenta

[functions.pinka-webhook]
verify_jwt = false   # server-to-server s pay rail-a; autentikacija je svix HMAC potpis, ne JWT

[functions.auth-send-email]
verify_jwt = false   # GoTrue Send-Email hook; autentikacija je svix HMAC (SEND_EMAIL_HOOK_SECRET)

[functions.youtube-claim]
verify_jwt = false   # callback nema sesiju (OAuth code); start/reverify interno getUser

[functions.safe-owner-add]
verify_jwt = false   # interno getUser + eligibility re-check (ownership∧KYC∧svježina)

[functions.account-delete]
verify_jwt = false   # interno getUser (permanent check); briše auth.users preko admin API-ja
