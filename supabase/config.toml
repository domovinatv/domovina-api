# Supabase CLI config (minimal — koristi se ako kasnije instaliraš `supabase` CLI).
# Trenutni workflow ne ovisi o CLI-u; sve ide kroz scripts/db-*.sh + SSH + docker exec.
# Kad budemo dodali type-gen (`supabase gen types dart`), CLI postaje koristan.

project_id = "domovina-api"

[db]
port = 54322
shadow_port = 54320
major_version = 15

[api]
schemas = ["public", "domovina_ai", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]

[auth]
site_url = "https://domovina.ai"
additional_redirect_urls = [
  "https://domovina.ai",
  "https://www.domovina.ai",
  "https://domovina.energy",
  "https://www.domovina.energy",
  "https://domovina.tv",
  "https://www.domovina.tv",
  "http://localhost:3000",
  "http://localhost:5173",
  "ai.domovina://auth/callback",
]
jwt_expiry = 3600
enable_signup = true

[functions.handoff-consume]
verify_jwt = false   # interno verificiramo authHeader (getUser) prije consume-a

[functions.passkey]
verify_jwt = false   # login/register-new nemaju sesiju; auth se interno provjerava gdje treba

[functions.certilia]
verify_jwt = false   # bridge prima Certilia idToken (verificira se interno vs JWKS), ne GoTrue JWT

[functions.pinka-contribute]
verify_jwt = false   # interno getUser (anon sesija je OK); create_contribution ide preko user klijenta

[functions.pinka-webhook]
verify_jwt = false   # server-to-server s pay rail-a; autentikacija je svix HMAC potpis, ne JWT
